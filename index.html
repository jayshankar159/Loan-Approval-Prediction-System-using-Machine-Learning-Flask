<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Approval Prediction</title>

    <!-- 🔹 Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Loan Approval Prediction</h1>

    <form method="POST">

        <label>Gender</label>
        <select name="Gender" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label>Married</label>
        <select name="Married">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <label>Dependents</label>
        <select name="Dependents">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3+">3+</option>
        </select>

        <label>Education</label>
        <select name="Education">
            <option value="Graduate">Graduate</option>
            <option value="Not Graduate">Not Graduate</option>
        </select>

        <label>Self Employed</label>
        <select name="Self_Employed">
            <option value="No">No</option>
            <option value="Yes">Yes</option>
        </select>

        <label>Applicant Income</label>
        <input type="number" name="ApplicantIncome" placeholder="Enter income" required>

        <label>Coapplicant Income</label>
        <input type="number" name="CoapplicantIncome" placeholder="Enter income">

        <label>Loan Amount</label>
        <input type="number" name="LoanAmount" placeholder="Enter loan amount" required>

        <label>Loan Amount Term</label>
        <input type="number" name="Loan_Amount_Term" value="360">

        <label>Credit History</label>
        <select name="Credit_History">
            <option value="1">Good (1)</option>
            <option value="0">Bad (0)</option>
        </select>

        <label>Property Area</label>
        <select name="Property_Area">
            <option value="Urban">Urban</option>
            <option value="Semiurban">Semiurban</option>
            <option value="Rural">Rural</option>
        </select>

        <button type="submit">Predict Loan</button>
    </form>

    {% if result %}
        <div class="result">
            {{ result }}
        </div>
    {% endif %}
</div>

</body>
</html>
